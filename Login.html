<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- FONTES PARA TEXTO -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            background-color: #313131;
            justify-content: center;
            align-items: center;

            font-family: 'Montserrat', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #2a2a2a;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            height: 300px;
            width: 250px;
        }

        .card form {
            display: flex;
            height: 300px;
            width: 250px;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .card input[type="email"],
        .card input[type="password"] {
            width: 170px;
            height: 30px;
            background-color: #353535;
            color: white;
            border-radius: 4px;
            border: 0;
        }

        .card input[type="email"]::placeholder,
        .card input[type="password"]::placeholder {
            color: white;
        }

        .card h1 {
            color: white;
            margin-top: -5px;
            padding: 40px;
        }

        .card button {
            width: 60px;
            height: 30px;
            background-color: white;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
        }

        .options label {
            display: flex;
            color: white;
            align-items: center;
            font-size: 10px;
        }

        .options input[type="checkbox"]:checked {
            accent-color: white;
        }

        .options a {
            display: flex;
            color: white;
            font-size: 10px;
            text-decoration: none;
        }

        .options {
            display: flex;
            width: 235px;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            margin-bottom: 10px;
        }

        .register-account {
            display: flex;
            align-items: center;
            color: white;
            font-size: 12px;
            gap: 10px;
        }

        .register-account button {
            background-color: white;
            border-radius: 10px;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
        }

        .card button:hover,
        .register-account button:hover {
            background-color: #e0e0e0;
        }

        .card input[type="checkbox"],
        .options label {
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>Sign in</h1>

            <form action="" method="post">

                <input type="email" name="email" id="email" placeholder="Email" required>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>

                <div class="options">
                    <label for="checkbox-remember">
                        <input type="checkbox" name="checkbox-remember" id="checkbox-remember">
                        Remember me?
                    </label>

                    <a href="https://youtu.be/dQw4w9WgXcQ?si=Jy1RPtiwDrB4zT-n">Forget password</a>

                </div>

            </form>

        </div>

        <div class="register-account">
            Don't have account?
            <button type="button" onclick="window.location.href='Register_account.html'">
                Register here
            </button>
        </div>

    </div>

</body>
</html>
