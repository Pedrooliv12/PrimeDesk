<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register account</title>

    <!-- FONTES PARA TEXTO -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            background-color: #313131;
            justify-content: center;
            align-items: center;

            font-family: 'Montserrat', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #2a2a2a;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            height: 300px;
            width: 250px;
            margin-bottom: 10px;
        }

        .card h1 {
            color: white;
            margin-top: -15px;
            padding: 20px;
        }

        .card form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            gap: 10px;
        }

        .card input[type="email"],
        .card input[type="password"],
        .card input[type="password_comfirm"] {
            width: 170px;
            height: 30px;
            background-color: #353535;
            color: white;
            border-radius: 4px;
            border: 0;
        }

        .card input[type="email"]::placeholder,
        .card input[type="password"]::placeholder,
        .card input[type="password"]::placeholder {
            color: white;
        }

        .card button {
            width: 70px;
            height: 30px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
        }

        .card button:hover {
            background-color: #e0e0e0;
        }

        .sign_in {
            display: flex;
            align-items: center;
            color: white;
            font-size: 12px;
            gap: 10px;
        }

        .sign_in button {
            background-color: white;
            border-radius: 10px;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
        }

        .sign_in button:hover {
            background-color: #e0e0e0;
        }

    </style>
</head>
<body>
    
    <div class="container">

        <div class="card">

            <h1>Register</h1>

            <form action="" method="post">

                <input type="email" name="email" id="email" placeholder="Email" required>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <input type="password" name="password_comfirm" id="password_comfirm" placeholder="Password-comfirm" required>
                <button type="submit">Register</button>

            </form>

        </div>

        <div class="sign_in">
            Already have an account?
            <button type="button" onclick="window.location.href='Login.html'">
                Sign in
            </button>

        </div>

    </div>

</body>
</html>
